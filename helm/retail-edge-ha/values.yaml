# =============================================================================
# Retail Edge HA Workshop - Primary Configuration File
# =============================================================================
# This values.yaml file is the single source of truth for all workshop
# configuration. Adjust these values to customize the deployment for your
# OpenShift cluster and student count.
#
# Usage:
#   helm install retail-edge-ha ./helm/retail-edge-ha --values values.yaml
#   helm upgrade retail-edge-ha ./helm/retail-edge-ha --set students.count=25
# =============================================================================

# Global Configuration
# -----------------------------------------------------------------------------
global:
  # OpenShift cluster domain (update for your cluster)
  clusterDomain: apps.cluster-cfz7p.dynamic.redhatworkshops.io

  # OpenShift API server URL
  clusterApiUrl: https://api.cluster-cfz7p.dynamic.redhatworkshops.io:6443

  # Workshop unique identifier
  workshopName: retail-edge-ha

  # Deployment GUID (unique identifier for this deployment)
  guid: "cfz7p"

# Student Configuration
# -----------------------------------------------------------------------------
students:
  # Enable student provisioning
  enabled: true

  # Number of students (1-50 supported)
  count: 2

  # Username prefix (creates student-01, student-02, etc.)
  userbase: "student"

  # Namespace prefix (creates retail-edge-student-01, etc.)
  namespacePrefix: "retail-edge"

  # Starting number for students (usually 1)
  startNumber: 1

  # Resource quotas per student namespace
  quotas:
    enabled: true
    cpu: "16"           # CPU cores (enough for 9 VMs)
    memory: "56Gi"      # Memory: 16+16+8Gi twonode VMs + 4×4Gi module VMs + virt-launcher overhead
    pvcs: "15"          # Persistent Volume Claims (7 VM disks + 3 discovery ISOs + headroom)
    storage: "650Gi"    # Total storage: 403Gi steady-state + 120Gi CDI prime PVC during blank disk import + buffer
    pods: "20"          # Maximum pods

# ArgoCD Configuration
# -----------------------------------------------------------------------------
argocd:
  # ArgoCD namespace
  namespace: openshift-gitops

  # ArgoCD project name
  project: default

  # Sync policy configuration
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

# Operators Configuration
# -----------------------------------------------------------------------------
operators:
  # Enable operator installation (required for VirtualMachines)
  enabled: true

  # Sync wave (-1 = before infrastructure, ensures CNV is ready before VMs)
  syncWave: "-1"

  # OpenShift Virtualization configuration
  kubevirt:
    # Operator channel
    channel: "stable"

    # Automatic install plan approval
    installPlanApproval: Automatic

    # Boot image import (false for external Ceph storage)
    # External Ceph doesn't support VolumeSnapshots for boot sources
    enableBootImageImport: false

# Fleet Management Configuration
# -----------------------------------------------------------------------------
fleetManagement:
  enabled: true

  # Sync wave (-2 = before CNV operator, establishes fleet management first)
  syncWave: "-2"

  # Red Hat Advanced Cluster Management (RHACM) configuration
  rhacm:
    # When false, RHACM operator/MCH/ManagedClusters are managed by AgnosticD
    # (install_rhacm.yml) to avoid circular dependencies in ArgoCD.
    argocdManaged: false

    # RHACM version (2.16+ includes Edge Manager)
    version: "2.16"

    # Operator channel
    channel: "release-2.16"

    # RHACM namespace
    namespace: "open-cluster-management"

    # Edge Manager capabilities
    edgeManager:
      # redhat-rhem chart requires a pre-existing DB on fresh ArgoCD install.
      # Disabled until we add a dedicated AgnosticD task (install_edge_manager.yml).
      enabled: false

      # Namespace for Edge Manager deployment
      namespace: "redhat-edge-manager"

      # Helm chart configuration
      chart:
        repoURL: "https://charts.openshift.io"
        chartName: "redhat-rhem"
        version: "1.0.2"

      # Integrate with ACM console (flightctl-plugin dynamic plugin)
      acmIntegration: true

      # Create ManagedCluster CRs for each student representing edge sites
      createManagedClusters: true

    # MultiClusterHub configuration
    hub:
      # Availability configuration (High for production-like experience)
      availabilityConfig: "High"

      # Enable cluster backup (false for workshop)
      enableClusterBackup: false

      # Components to enable
      components:
        console: true          # RHACM web console
        insights: true         # Cluster insights and recommendations
        applicationUI: true    # Application lifecycle management UI
        clusterLifecycle: true # Cluster provisioning and management
        grc: true             # Governance, risk, and compliance
        search: true          # Fleet inventory search

    # Assisted Installer configuration (Module 3: two-node OCP via KubeVirt)
    # AgentServiceConfig is created by AgnosticD (install_rhacm.yml) after MCH is ready.
    assistedInstaller:
      enabled: true
      # PVC sizes for the Assisted Service on the hub
      databaseStorageSize: 10Gi
      filesystemStorageSize: 50Gi
      imageStorageSize: 50Gi
      # Storage class for Assisted Service PVCs
      storageClass: ocs-external-storagecluster-ceph-rbd-immediate
      # Target OCP version for the two-node edge cluster
      ocpVersion: "4.21"
      # baseDomain is auto-filled by AgnosticD from cluster ingress discovery
      baseDomain: ""
      # Pull secret and SSH key injected into student-NN-twonode namespaces by AgnosticD
      pullSecret: ""
      sshKey: ""

# Infrastructure Configuration
# -----------------------------------------------------------------------------
infrastructure:
  # Enable infrastructure components (disabled - namespaces/quotas now in Helm templates)
  enabled: false

  # Infrastructure namespace
  namespace: retail-edge-infrastructure

  # Sync wave (order of deployment)
  syncWave: "0"

# Networking Configuration
# -----------------------------------------------------------------------------
networking:
  # Enable networking components
  enabled: true

  # Sync wave
  syncWave: "1"

  # User Defined Networks (UDNs) configuration
  udn:
    enabled: true

    # Primary network for general connectivity
    primaryNetwork:
      cidr: "10.100.0.0/16"
      gateway: "10.100.0.1"

    # Module 1: RHEL HA Pacemaker network
    module1Network:
      name: "pacemaker-net"
      cidr: "10.101.0.0/24"
      gateway: "10.101.0.1"
      description: "Layer 2 network for Corosync heartbeat and cluster traffic"

    # Module 2: MicroShift VRRP network
    module2Network:
      name: "microshift-net"
      cidr: "10.102.0.0/24"
      gateway: "10.102.0.1"
      vrrpVIP: "10.102.0.100"
      description: "Layer 2 network for VRRP virtual IP failover"

    # Module 3: Two-Node OpenShift network
    module3Network:
      name: "twonode-net"
      cidr: "10.103.0.0/24"
      gateway: "10.103.0.1"
      description: "Layer 2 network for two-node cluster communication"

  # Network IP assignments for Showroom variables
  module1:
    networkName: "pacemaker-net"
    node1Ip: "10.101.0.20"
    node2Ip: "10.101.0.21"
    virtualIp: "10.101.0.100"

  module2:
    networkName: "microshift-net"
    gwAIp: "10.102.0.20"
    gwBIp: "10.102.0.21"
    virtualIp: "10.102.0.100"

  module3:
    networkName: "twonode-net"
    master1Ip: "10.103.0.20"
    master2Ip: "10.103.0.21"
    arbiterIp: "10.103.0.22"

# VirtualMachine Configuration
# -----------------------------------------------------------------------------
virtualMachines:
  # Enable VM provisioning
  enabled: true

  # Sync wave
  syncWave: "2"

  # Auto-start VMs after creation (true = VMs start automatically when deployed)
  autoStart: true

  # Storage class for VM disks
  storageClass: "ocs-external-storagecluster-ceph-rbd-immediate"

  # Default VM credentials
  defaultUser: "cloud-user"
  defaultPassword: "redhat"

  # Module 1: RHEL HA with Pacemaker (2 VMs per student)
  module1:
    enabled: true
    name: "rhel-ha"
    vmCount: 2

    # VM names
    vmNames:
      node1: "rhel-ha-node1"
      node2: "rhel-ha-node2"

    # VM image configuration
    image:
      url: "https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"
      name: "rhel9-stream"

    # Resource specifications
    resources:
      cpu:
        cores: 2
        sockets: 1
        threads: 1
      memory: "4Gi"
      disk: "30Gi"

    # Cloud-init configuration
    cloudInit:
      user: "cloud-user"
      sshKeySecret: "student-ssh-keys"
      packages:
        - pacemaker
        - pcs
        - fence-agents-kubevirt
        - corosync

  # Module 2: MicroShift with VRRP (2 VMs per student)
  module2:
    enabled: false
    name: "microshift"
    vmCount: 2

    # VM names
    vmNames:
      gwA: "microshift-gw-a"
      gwB: "microshift-gw-b"

    # VM image configuration
    image:
      url: "https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2"
      name: "rhel9-microshift"

    # Resource specifications
    resources:
      cpu:
        cores: 2
        sockets: 1
        threads: 1
      memory: "4Gi"
      disk: "40Gi"

    # Cloud-init configuration
    cloudInit:
      user: "cloud-user"
      sshKeySecret: "student-ssh-keys"
      packages:
        - microshift
        - microshift-selinux
        - microshift-networking
        - keepalived

  # Module 3: OpenShift Two-Node with Arbiter (3 VMs per student)
  # Uses RHACM Assisted Installer — VMs boot from InfraEnv discovery ISO
  module3:
    enabled: true
    name: "twonode-ocp"
    vmCount: 3
    controlPlaneNodes: 2
    arbiterNodes: 1

    # VM names
    vmNames:
      master1: "twonode-master1"
      master2: "twonode-master2"
      arbiter: "twonode-arbiter"

    # VM image configuration
    image:
      url: "https://mirror.openshift.com/pub/openshift-v4/dependencies/rhcos/latest/rhcos-live.x86_64.iso"
      name: "rhcos-latest"

    # Resource specifications for control plane nodes
    resources:
      controlPlane:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        memory: "16Gi"
        disk: "120Gi"

      # Resource specifications for arbiter node
      # Minimum 2 CPU / 8Gi RAM required for RHCOS discovery agent to register.
      # After install, etcd-arbiter only uses 1 CPU / 2Gi — but discovery phase needs more.
      arbiter:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        memory: "8Gi"
        disk: "20Gi"

# Showroom Workshop Configuration (Modern Platform)
# -----------------------------------------------------------------------------
showroom:
  # Enable Showroom deployment
  enabled: true

  # Sync wave (deploy after VMs)
  syncWave: "3"

  # Git repository with Antora content
  git:
    repository: https://github.com/tosin2013/retail-edge-ha-workshop.git
    branch: main
    contentPath: content  # Antora content directory

  # Terminal configuration
  terminal:
    type: showroom  # ttyd pod-based terminal (vs wetty SSH)
    image: docker.io/wettyoss/wetty:latest  # Note: ttyd-ocp is private, wetty doesn't include CLI tools

  # Deployment
  namespace: showroom  # Main Showroom namespace
  replicas: 1

  # Multi-user configuration
  multiUser:
    enabled: true
    namespacePrefix: showroom-student  # Creates showroom-student-01, -02, etc.

  # Helm chart
  chart:
    repository: https://rhpds.github.io/showroom-deployer
    name: showroom
    version: "0.4.9"  # Showroom deployer chart version (latest stable)

# Showroom Configuration (ConfigMaps)
# -----------------------------------------------------------------------------
showroomConfig:
  # Enable showroom-config ArgoCD app
  enabled: true
  syncWave: "4"

# RBAC Configuration
# -----------------------------------------------------------------------------
rbac:
  # Enable RBAC provisioning (disabled - RBAC now in Helm templates)
  enabled: false

  # Sync wave
  syncWave: "1"

  # Student permissions (applied to student namespaces)
  studentPermissions:
    - apiGroups: ["kubevirt.io"]
      resources: ["virtualmachines", "virtualmachineinstances"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

    - apiGroups: [""]
      resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

    - apiGroups: ["k8s.ovn.org"]
      resources: ["userdefinednetworks"]
      verbs: ["get", "list", "watch"]

    - apiGroups: ["k8s.cni.cncf.io"]
      resources: ["network-attachment-definitions"]
      verbs: ["get", "list", "watch"]

# Resource Quotas
# -----------------------------------------------------------------------------
resourceQuotas:
  # Enable resource quotas per student namespace
  enabled: true

  # Per-student limits
  limits:
    # Total CPU across all VMs
    cpu: "16"

    # Total memory across all VMs
    memory: "56Gi"

    # Maximum number of PVCs
    persistentvolumeclaims: "10"

    # Total storage requests
    requests.storage: "650Gi"

# Monitoring and Observability
# -----------------------------------------------------------------------------
monitoring:
  # Enable monitoring (future feature)
  enabled: false

  # Prometheus scrape interval
  prometheus:
    scrapeInterval: "30s"

  # Grafana dashboards
  grafana:
    enabled: false
    dashboards:
      - vm-performance
      - student-activity
      - resource-utilization

# Post-Deployment Validation
# -----------------------------------------------------------------------------
validation:
  # Enable post-deployment validation job
  # Runs as ArgoCD PostSync hook to validate workshop deployment
  enabled: false

  # Container image with oc CLI, git, and jq
  # Must include: oc, git, jq, bash
  image: "registry.redhat.io/openshift4/ose-cli:latest"

  # Git repository containing validation scripts
  # This should be your workshop repository URL
  gitRepo: "https://github.com/tosin2013/retail-edge-ha-workshop.git"

  # Git branch or tag to use
  gitRef: "main"

# Jumpbox Configuration (Terminal Access with CLI Tools)
# -----------------------------------------------------------------------------
jumpbox:
  # Enable jumpbox pod deployment
  # Provides SSH-accessible bastion pod per student with oc/virtctl pre-installed
  # DEPRECATED: Now using custom WeTTY image with CLI tools embedded (Option 3)
  enabled: false

  # Build configuration (uses OpenShift BuildConfig + internal registry)
  buildNamespace: retail-edge-workshop-builds
  sourceRepo: https://github.com/tosin2013/retail-edge-ha-workshop.git
  sourceRef: main
  contextDir: jumpbox

  # ArgoCD sync waves
  # buildSyncWave: Creates namespace, ImageStream, BuildConfig (starts image build)
  # deploySyncWave: Deploys jumpbox pods (must be < showroom.syncWave)
  buildSyncWave: "0"
  deploySyncWave: "2"

  # SSH credentials (WeTTY will auto-login with these)
  username: student
  password: redhat

  # Resource limits per jumpbox pod
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
