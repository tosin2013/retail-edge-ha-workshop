{{- if and .Values.virtualMachines.enabled .Values.virtualMachines.module1.enabled }}
---
# =============================================================================
# VirtualMachines Module 1 Child Application
# =============================================================================
# Deploys RHEL HA with Pacemaker VirtualMachines (2 VMs per student).
# Sync Wave: 2 (deployed after networking)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.global.workshopName }}-vms-module1
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: vms-module1
    app.kubernetes.io/component: child-app
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.virtualMachines.syncWave | quote }}
spec:
  project: {{ .Values.argocd.project }}

  source:
    repoURL: {{ .Values.showroom.git.repository }}
    targetRevision: {{ .Values.showroom.git.branch }}
    path: manifests/vms/module1-rhel-ha

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.infrastructure.namespace }}

  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /status
    - group: kubevirt.io
      kind: VirtualMachine
      jsonPointers:
        - /spec/running
        - /spec/runStrategy

  syncPolicy:
    {{- toYaml .Values.argocd.syncPolicy | nindent 4 }}

  info:
    - name: Component
      value: VirtualMachines Module 1 (RHEL HA with Pacemaker)
    - name: VMs per Student
      value: {{ .Values.virtualMachines.module1.vmCount | quote }}
    - name: Total VMs
      value: {{ mul .Values.students.count .Values.virtualMachines.module1.vmCount | quote }}
{{- end }}
