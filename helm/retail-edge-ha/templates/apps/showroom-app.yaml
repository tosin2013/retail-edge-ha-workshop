{{- if .Values.showroom.enabled }}
{{- range $studentNum := until (int .Values.students.count) }}
{{- $studentId := add $studentNum 1 | printf "%02d" }}
{{- $namespace := printf "%s-%s" $.Values.showroom.multiUser.namespacePrefix $studentId }}
{{- $studentNamespace := printf "%s-%s-%s" $.Values.students.namespacePrefix $.Values.students.userbase $studentId }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retail-edge-ha-showroom-{{ $studentId }}
  namespace: {{ $.Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: retail-edge-ha-showroom-{{ $studentId }}
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    student-id: "{{ $studentId }}"
  annotations:
    argocd.argoproj.io/sync-wave: {{ $.Values.showroom.syncWave | quote }}
spec:
  project: {{ $.Values.argocd.project }}
  source:
    repoURL: {{ $.Values.showroom.chart.repository }}
    chart: {{ $.Values.showroom.chart.name }}
    targetRevision: {{ $.Values.showroom.chart.version }}
    helm:
      parameters:
      # Namespace configuration
      - name: namespace.name
        value: {{ $namespace }}

      # Content configuration (Showroom chart parameter names)
      - name: content.repoUrl
        value: {{ $.Values.showroom.git.repository }}
      - name: content.repoRef
        value: {{ $.Values.showroom.git.branch }}
      - name: content.antoraPlaybook
        value: site.yml

      # Deployer configuration
      - name: deployer.domain
        value: {{ $.Values.global.clusterDomain }}
      - name: deployer.ingress.name
        value: showroom-student-{{ $studentId }}

      # Terminal configuration
      - name: terminal.image
        value: {{ $.Values.showroom.terminal.image }}
{{- if $.Values.jumpbox.enabled }}
      # WeTTY SSH configuration - auto-connect to jumpbox pod
      - name: terminal.wetty.autoSshToBastion
        value: "true"
      - name: terminal.wetty.sshHost
        value: "jumpbox.{{ $studentNamespace }}.svc.cluster.local"
      - name: terminal.wetty.sshPort
        value: "22"
      - name: terminal.wetty.sshAuth
        value: "password"
      - name: terminal.wetty.sshUser
        value: {{ $.Values.jumpbox.username | quote }}
      - name: terminal.wetty.sshPass
        value: {{ $.Values.jumpbox.password | quote }}
{{- end }}
      # Student environment variables (passed to shell inside jumpbox)
      - name: terminal.envVars.STUDENT_ID
        value: "{{ $studentId }}"
      - name: terminal.envVars.STUDENT_NAMESPACE
        value: "{{ $studentNamespace }}"
      - name: terminal.envVars.STUDENT_USER
        value: "{{ $.Values.students.userbase }}-{{ $studentId }}"

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
