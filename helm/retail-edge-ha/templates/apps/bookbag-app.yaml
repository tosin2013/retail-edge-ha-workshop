{{- if false }}
---
# =============================================================================
# Bookbag Child Application - DISABLED
# =============================================================================
# NOTE: This child app is disabled because Bookbag is now integrated directly
# into the main Helm chart via templates/bookbag/ directory.
#
# The parent ArgoCD application renders the entire Helm chart, which includes
# Bookbag deployments for all students automatically.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.global.workshopName }}-bookbag
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: bookbag
    app.kubernetes.io/component: child-app
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.bookbag.syncWave | quote }}
spec:
  project: {{ .Values.argocd.project }}

  source:
    repoURL: {{ .Values.bookbag.git.repository }}
    targetRevision: {{ .Values.bookbag.git.branch }}
    path: helm/retail-edge-ha
    helm:
      releaseName: {{ .Values.global.workshopName }}-bookbag
      valueFiles:
        - values.yaml
      parameters:
        - name: bookbag.enabled
          value: "true"
        - name: students.count
          value: {{ .Values.students.count | quote }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.bookbag.build.namespace }}

  syncPolicy:
    {{- toYaml .Values.argocd.syncPolicy | nindent 4 }}

  info:
    - name: Component
      value: Bookbag Workshop Content
    - name: Image
      value: {{ .Values.bookbag.image.repository }}:{{ .Values.bookbag.image.tag }}
{{- end }}
