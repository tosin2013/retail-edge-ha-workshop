{{- if .Values.bookbag.childApp.enabled }}
---
# =============================================================================
# Bookbag Child Application - Enabled for GitOps Deployment
# =============================================================================
# This child app deploys Bookbag separately to avoid parent app sync timeout
# when rendering large Helm charts. Bookbag is deployed at sync wave 3 after
# all infrastructure, networking, and VMs are ready.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.global.workshopName }}-bookbag
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: bookbag
    app.kubernetes.io/component: child-app
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.bookbag.childApp.syncWave | quote }}
spec:
  project: {{ .Values.argocd.project }}

  source:
    repoURL: {{ .Values.bookbag.git.repository }}
    targetRevision: {{ .Values.bookbag.git.branch }}
    path: helm/retail-edge-ha
    helm:
      releaseName: {{ .Values.global.workshopName }}-bookbag
      valueFiles:
        - values.yaml
      parameters:
        - name: bookbag.enabled
          value: "true"
        - name: bookbag.childApp.enabled
          value: "false"  # Prevent recursive child app creation
        - name: students.count
          value: {{ .Values.students.count | quote }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.bookbag.build.namespace }}

  syncPolicy:
    {{- toYaml .Values.argocd.syncPolicy | nindent 4 }}

  info:
    - name: Component
      value: Bookbag Workshop Content
    - name: Image
      value: {{ .Values.bookbag.image.repository }}:{{ .Values.bookbag.image.tag }}
{{- end }}
