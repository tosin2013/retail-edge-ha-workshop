{{- if .Values.bookbag.enabled }}
---
# =============================================================================
# Bookbag Child Application
# =============================================================================
# Deploys the containerized workshop lab guide with embedded instructions.
# Sync Wave: 3 (deployed last, after VMs)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.global.workshopName }}-bookbag
  namespace: {{ .Values.argocd.namespace }}
  labels:
    app.kubernetes.io/name: bookbag
    app.kubernetes.io/component: child-app
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.bookbag.syncWave | quote }}
spec:
  project: {{ .Values.argocd.project }}

  source:
    repoURL: {{ .Values.bookbag.git.repository }}
    targetRevision: {{ .Values.bookbag.git.branch }}
    path: manifests/bookbag
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.bookbag.namespace }}

  syncPolicy:
    {{- toYaml .Values.argocd.syncPolicy | nindent 4 }}

  info:
    - name: Component
      value: Bookbag Workshop Content
    - name: Image
      value: {{ .Values.bookbag.image.repository }}:{{ .Values.bookbag.image.tag }}
{{- end }}
