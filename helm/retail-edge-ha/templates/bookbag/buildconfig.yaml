{{- if and .Values.bookbag.enabled (not .Values.bookbag.childApp.enabled) }}
---
# =============================================================================
# Bookbag BuildConfig - Builds workshop container image from Git
# =============================================================================
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: {{ .Values.global.workshopName }}-bookbag
  namespace: {{ .Values.bookbag.build.namespace }}
  labels:
    app: bookbag
    app.kubernetes.io/name: bookbag
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  annotations:
    description: "Workshop lab guide container image"

---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: {{ .Values.global.workshopName }}-bookbag
  namespace: {{ .Values.bookbag.build.namespace }}
  labels:
    app: bookbag
    app.kubernetes.io/name: bookbag
    app.kubernetes.io/part-of: retail-edge-ha-workshop
spec:
  output:
    to:
      kind: ImageStreamTag
      name: {{ .Values.global.workshopName }}-bookbag:{{ .Values.bookbag.image.tag }}
  source:
    git:
      uri: {{ .Values.bookbag.git.repository }}
      ref: {{ .Values.bookbag.git.branch }}
    contextDir: bookbag
    type: Git
  strategy:
    dockerStrategy:
      dockerfilePath: Dockerfile
    type: Docker
  triggers:
  - type: ConfigChange
  - type: ImageChange
{{- end }}
