{{- if .Values.jumpbox.enabled }}
{{- range $studentNum := until (int .Values.students.count) }}
{{- $studentId := add $studentNum 1 | printf "%02d" }}
{{- $namespace := printf "%s-%s-%s" $.Values.students.namespacePrefix $.Values.students.userbase $studentId }}
---
# Allow student namespace to pull jumpbox image from build namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jumpbox-image-puller-{{ $studentId }}
  namespace: {{ $.Values.jumpbox.buildNamespace }}
  labels:
    app: jumpbox
    student-id: "{{ $studentId }}"
  annotations:
    argocd.argoproj.io/sync-wave: {{ add (int $.Values.jumpbox.buildSyncWave) 1 | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
- kind: ServiceAccount
  name: jumpbox-sa
  namespace: {{ $namespace }}
{{- end }}
{{- end }}
