{{- if .Values.showroom.enabled }}
{{- range $studentNum := until (int .Values.students.count) }}
{{- $studentId := add $studentNum 1 | printf "%02d" }}
{{- $showroomNamespace := printf "%s-%s" $.Values.showroom.multiUser.namespacePrefix $studentId }}
{{- $studentNamespace := printf "%s-%s-%s" $.Values.students.namespacePrefix $.Values.students.userbase $studentId }}
{{- $udnNamespace := printf "%s-udn" $studentNamespace }}
---
# RoleBinding to give Showroom terminal access to student namespace
# Note: ServiceAccount is created by Showroom chart, we just grant it permissions here
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-terminal-student-access
  namespace: {{ $studentNamespace }}
  labels:
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    student-id: "{{ $studentId }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit  # OpenShift's built-in edit role (allows VM management, pod exec, etc.)
subjects:
- kind: ServiceAccount
  name: showroom-terminal
  namespace: {{ $showroomNamespace }}
---
# RoleBinding to give Showroom terminal access to student UDN namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: showroom-terminal-udn-access
  namespace: {{ $udnNamespace }}
  labels:
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    student-id: "{{ $studentId }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view  # Read-only access to UDNs
subjects:
- kind: ServiceAccount
  name: showroom-terminal
  namespace: {{ $showroomNamespace }}
{{- end }}
{{- end }}
