  name: student-02
  apiGroup: rbac.authorization.k8s.io
- kind: ServiceAccount
  name: default
  namespace: showroom-student-02
roleRef:
  kind: ClusterRole
  name: retail-edge-managedcluster-viewer
  apiGroup: rbac.authorization.k8s.io
