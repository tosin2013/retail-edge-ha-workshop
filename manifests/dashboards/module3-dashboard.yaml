# Module 3: Two-Node OpenShift Status Dashboard
# Runs as an OpenShift pod (not Fleet Manager) since Module 3 VMs are RHCOS.
# Queries the Kubernetes API for VM status and pings VMI IPs.
#
# Usage: oc apply -f manifests/dashboards/module3-dashboard.yaml -n <student-namespace>
#        oc expose svc/cluster-status-twonode -n <student-namespace>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-status-web
  labels:
    app: cluster-status-twonode
    module: module3
data:
  cluster-status-web.py: |
    # Content is applied from manifests/dashboards/cluster-status-web.py
    # Use: oc create configmap cluster-status-web --from-file=cluster-status-web.py=manifests/dashboards/cluster-status-web.py
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-status-dashboard
  labels:
    app: cluster-status-twonode
    module: module3
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-status-viewer
  labels:
    app: cluster-status-twonode
    module: module3
rules:
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines", "virtualmachineinstances"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-status-viewer-binding
  labels:
    app: cluster-status-twonode
    module: module3
subjects:
  - kind: ServiceAccount
    name: cluster-status-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-status-viewer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-status-twonode
  labels:
    app: cluster-status-twonode
    module: module3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-status-twonode
  template:
    metadata:
      labels:
        app: cluster-status-twonode
        module: module3
    spec:
      serviceAccountName: cluster-status-dashboard
      containers:
        - name: dashboard
          image: registry.access.redhat.com/ubi9/python-39:latest
          command: ["python3", "/app/cluster-status-web.py"]
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: app
          configMap:
            name: cluster-status-web
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-status-twonode
  labels:
    app: cluster-status-twonode
    module: module3
spec:
  selector:
    app: cluster-status-twonode
  ports:
    - port: 8080
      targetPort: 8080
