# =============================================================================
# RHSM Credential Injection — PostSync Hook Job
# =============================================================================
# Runs after every ArgoCD sync as a PostSync hook. Reads RHSM credentials
# from the 'rhel-subscription-creds' Secret (created by AgnosticD, not ArgoCD)
# and patches the cloud-init Secrets in every student namespace so cloud-init
# can register RHEL and install packages (pacemaker, microshift, etc.).
#
# Covers:
#   Module 1 (Pacemaker HA):  rhel-ha-node1-cloudinit, rhel-ha-node2-cloudinit
#   Module 2 (MicroShift):    cloudinit-microshift-gw-a, cloudinit-microshift-gw-b
#
# Why a Job vs. apply-vm-manifests.sh:
#   ArgoCD selfHeal:true reverts any manual Secret patches on the next sync.
#   This Job re-patches after every sync, making the fix self-sustaining.
#
# Prerequisite: AgnosticD workload.yml must create 'rhel-subscription-creds'
# in the 'openshift-cnv' namespace before ArgoCD syncs.
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhsm-injector
  namespace: retail-edge-student-01
  labels:
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    app.kubernetes.io/component: rhsm-injection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhsm-secret-patcher
  labels:
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    app.kubernetes.io/component: rhsm-injection
rules:
  # Read RHSM credentials from openshift-cnv
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["rhel-subscription-creds"]
    verbs: ["get"]
    # Note: resourceNames filter only works within a namespace; the Job uses
    # a broader Secret get permission scoped by the script logic below.
  # Read and patch cloud-init Secrets in all namespaces
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "update"]
  # List namespaces to find student namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhsm-injector-binding
  labels:
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    app.kubernetes.io/component: rhsm-injection
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhsm-secret-patcher
subjects:
  - kind: ServiceAccount
    name: rhsm-injector
    namespace: retail-edge-student-01
---
apiVersion: batch/v1
kind: Job
metadata:
  name: inject-rhsm-creds
  namespace: retail-edge-student-01
  labels:
    app.kubernetes.io/part-of: retail-edge-ha-workshop
    app.kubernetes.io/component: rhsm-injection
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: retail-edge-ha-workshop
        app.kubernetes.io/component: rhsm-injection
    spec:
      serviceAccountName: rhsm-injector
      restartPolicy: OnFailure
      containers:
        - name: inject
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              echo "=== RHSM Credential Injection Job ==="

              # Read credentials from the Secret created by AgnosticD
              ACTIVATION_KEY=$(oc get secret rhel-subscription-creds \
                -n openshift-cnv \
                -o jsonpath='{.data.activation-key}' 2>/dev/null | base64 -d)
              ORG_ID=$(oc get secret rhel-subscription-creds \
                -n openshift-cnv \
                -o jsonpath='{.data.org-id}' 2>/dev/null | base64 -d)

              if [[ -z "$ACTIVATION_KEY" || -z "$ORG_ID" ]]; then
                echo "ERROR: rhel-subscription-creds not found or empty in openshift-cnv."
                echo "Run AgnosticD workload deployment with RHSM credentials configured."
                exit 1
              fi

              echo "Credentials found (key: ${ACTIVATION_KEY:0:8}...)"

              # Discover all student namespaces by label
              STUDENT_NAMESPACES=$(oc get namespaces \
                -l workshop=retail-edge-ha \
                -o jsonpath='{.items[*].metadata.name}')

              if [[ -z "$STUDENT_NAMESPACES" ]]; then
                echo "No student namespaces found with label workshop=retail-edge-ha"
                exit 0
              fi

              echo "Student namespaces: $STUDENT_NAMESPACES"

              # Cloud-init Secret names to patch (M1 + M2)
              M1_SECRETS="rhel-ha-node1-cloudinit rhel-ha-node2-cloudinit"
              M2_SECRETS="cloudinit-microshift-gw-a cloudinit-microshift-gw-b"
              ALL_SECRETS="$M1_SECRETS $M2_SECRETS"

              PATCHED=0
              SKIPPED=0

              for NS in $STUDENT_NAMESPACES; do
                echo ""
                echo "--- Namespace: $NS ---"
                for SECRET_NAME in $ALL_SECRETS; do
                  # Check if the Secret exists in this namespace
                  if ! oc get secret "$SECRET_NAME" -n "$NS" &>/dev/null; then
                    echo "  $SECRET_NAME: not present (module may be disabled), skipping"
                    SKIPPED=$((SKIPPED + 1))
                    continue
                  fi

                  # Get current userdata, check if it still has placeholders
                  CURRENT=$(oc get secret "$SECRET_NAME" -n "$NS" \
                    -o jsonpath='{.data.userdata}' | base64 -d 2>/dev/null || true)

                  if echo "$CURRENT" | grep -q "REPLACE_ACTIVATION_KEY"; then
                    echo "  $SECRET_NAME: patching REPLACE_ placeholders..."

                    # Substitute placeholders and re-encode
                    NEW_USERDATA=$(echo "$CURRENT" \
                      | sed "s|REPLACE_ACTIVATION_KEY|${ACTIVATION_KEY}|g" \
                      | sed "s|REPLACE_ORG_ID|${ORG_ID}|g")

                    NEW_B64=$(echo "$NEW_USERDATA" | base64 -w0)

                    oc patch secret "$SECRET_NAME" -n "$NS" \
                      --type='json' \
                      -p="[{\"op\":\"replace\",\"path\":\"/data/userdata\",\"value\":\"${NEW_B64}\"}]"

                    echo "  $SECRET_NAME: patched ✓"
                    PATCHED=$((PATCHED + 1))
                  else
                    echo "  $SECRET_NAME: already has real credentials, skipping"
                    SKIPPED=$((SKIPPED + 1))
                  fi
                done
              done

              echo ""
              echo "=== Done: ${PATCHED} patched, ${SKIPPED} skipped ==="
