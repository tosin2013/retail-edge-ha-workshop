# Cloud-init - Module 2: MicroShift Gateway A
# Generated for 5 students | IP via IPAMClaim: 10.102.0.20

---
# Student 01 - Cloud-init for MicroShift Gateway A
apiVersion: v1
kind: Secret
metadata:
  name: cloudinit-microshift-gw-a
  namespace: retail-edge-student-01
type: Opaque
stringData:
  userdata: |
    #cloud-config
    user: cloud-user
    password: redhat
    chpasswd: { expire: False }
    ssh_pwauth: True
    rh_subscription:
      activation-key: 'REPLACE_ACTIVATION_KEY'
      org: 'REPLACE_ORG_ID'
      enable-repo:
        - rhocp-4.21-for-rhel-9-x86_64-rpms
        - fast-datapath-for-rhel-9-x86_64-rpms
        - edge-manager-1.0-for-rhel-9-x86_64-rpms
    packages:
      - microshift
      - microshift-selinux
      - microshift-networking
      - keepalived
      - openshift-clients
      - firewalld
      - flightctl-agent
    write_files:
      - path: /etc/flightctl/config.yaml
        owner: root:root
        permissions: '0600'
        content: |
          enrollment-service:
            authentication:
              client-certificate-data: 
              client-key-data: 
            enrollment-ui-endpoint: https://console-openshift-console.apps.cluster-cfz7p.dynamic.redhatworkshops.io/edge
            service:
              certificate-authority-data: 
              server: https://agent-api.redhat-edge-manager.apps.cluster-cfz7p.dynamic.redhatworkshops.io/
      - path: /etc/flightctl/labels.yaml
        owner: root:root
        permissions: '0644'
        content: |
          module: microshift
          role: gw-a
          alias: microshift-gw-a
      - path: /etc/hosts
        owner: root:root
        permissions: '0644'
        append: true
        content: |
          10.102.0.20 microshift-gw-a
          10.102.0.21 microshift-gw-b
          10.102.0.100 microshift-vip
      - path: /etc/keepalived/keepalived.conf
        owner: root:root
        permissions: '0644'
        content: |
          vrrp_script check_microshift {
              script "/usr/bin/curl -k -s https://localhost:6443/readyz"
              interval 3
              weight -20
              fall 2
              rise 2
          }
          vrrp_instance MICROSHIFT_VIP {
              state MASTER
              interface eth1
              virtual_router_id 1
              priority 100
              advert_int 1
              authentication {
                  auth_type PASS
                  auth_pass microshift123
              }
              virtual_ipaddress {
                  10.102.0.100/24 dev eth1
              }
              track_script {
                  check_microshift
              }
          }
      - path: /etc/systemd/system/gateway-status-web.path
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=Start gateway dashboard when Fleet Manager delivers it
          [Path]
          PathExists=/etc/edge-config/gateway-status-web.py
          [Install]
          WantedBy=multi-user.target
      - path: /etc/edge-config/device-role
        owner: root:root
        permissions: '0644'
        content: "gw-a"
    runcmd:
      - hostnamectl set-hostname microshift-gw-a
      - systemctl enable --now firewalld
      - firewall-cmd --permanent --zone=trusted --add-source=10.42.0.0/16
      - firewall-cmd --permanent --zone=trusted --add-source=169.254.169.1
      - firewall-cmd --permanent --zone=public --add-port=6443/tcp
      - firewall-cmd --permanent --zone=public --add-port=80/tcp
      - firewall-cmd --permanent --zone=public --add-port=443/tcp
      - firewall-cmd --permanent --zone=public --add-port=5353/udp
      - firewall-cmd --permanent --add-protocol=vrrp
      - firewall-cmd --reload
      - systemctl enable --now microshift
      - bash -c 'for i in $(seq 1 60); do curl -k -s https://localhost:6443/readyz &>/dev/null && break; sleep 5; done'
      - mkdir -p /home/cloud-user/.kube
      - cp /var/lib/microshift/resources/kubeadmin/kubeconfig /home/cloud-user/.kube/config
      - chown -R cloud-user:cloud-user /home/cloud-user/.kube
      - chmod 600 /home/cloud-user/.kube/config
      - systemctl enable --now keepalived
      - systemctl enable --now flightctl-agent
      - systemctl daemon-reload
      - systemctl enable --now gateway-status-web.path

