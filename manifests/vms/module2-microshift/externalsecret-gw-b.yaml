# ExternalSecret - Module 2: MicroShift Gateway B
# Replaces cloudinit-gw-b.yaml. ESO renders the cloud-init Secret using:
#   - rhel-subscription-creds (openshift-cnv): RHSM activation key and org ID
#   - flightctl-enrollment-creds (openshift-cnv): enrollment client cert/key, CA bundle, server URLs
# Both Secrets are created by AgnosticD at deploy time. No credentials are stored in git.

---
# Student 01 - ExternalSecret for MicroShift Gateway B
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudinit-microshift-gw-b
  namespace: retail-edge-student-01
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: rhel-subscription-creds
    kind: ClusterSecretStore
  target:
    name: cloudinit-microshift-gw-b
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        userdata: |
          #cloud-config
          user: cloud-user
          password: redhat
          chpasswd: { expire: False }
          ssh_pwauth: True
          rh_subscription:
            activation-key: '{{ .activation_key }}'
            org: '{{ .org_id }}'
            enable-repo:
              - rhocp-4.21-for-rhel-9-x86_64-rpms
              - fast-datapath-for-rhel-9-x86_64-rpms
              - edge-manager-1.0-for-rhel-9-x86_64-rpms
          packages:
            - microshift
            - microshift-selinux
            - microshift-networking
            - keepalived
            - openshift-clients
            - firewalld
            - qemu-guest-agent
            - flightctl-agent
          write_files:
            - path: /etc/flightctl/config.yaml
              owner: root:root
              permissions: '0600'
              content: |
                enrollment-service:
                  authentication:
                    client-certificate-data: {{ .client_cert }}
                    client-key-data: {{ .client_key }}
                  enrollment-ui-endpoint: {{ .enrollment_ui }}
                  service:
                    certificate-authority-data: {{ .ca_data }}
                    server: {{ .agent_server }}
            - path: /etc/flightctl/labels.yaml
              owner: root:root
              permissions: '0644'
              content: |
                module: microshift
                role: gw-b
                alias: microshift-gw-b
            - path: /etc/hosts
              owner: root:root
              permissions: '0644'
              append: true
              content: |
                10.102.0.20 microshift-gw-a
                10.102.0.21 microshift-gw-b
                10.102.0.100 microshift-vip
            - path: /etc/keepalived/keepalived.conf
              owner: root:root
              permissions: '0644'
              content: |
                vrrp_script check_microshift {
                    script "/usr/bin/curl -k -s https://localhost:6443/readyz"
                    interval 3
                    weight -20
                    fall 2
                    rise 2
                }
                vrrp_instance MICROSHIFT_VIP {
                    state BACKUP
                    interface eth1
                    virtual_router_id 1
                    priority 90
                    advert_int 1
                    authentication {
                        auth_type PASS
                        auth_pass microshift123
                    }
                    virtual_ipaddress {
                        10.102.0.100/24 dev eth1
                    }
                    track_script {
                        check_microshift
                    }
                }
            - path: /etc/systemd/system/gateway-status-web.path
              owner: root:root
              permissions: '0644'
              content: |
                [Unit]
                Description=Start gateway dashboard when Fleet Manager delivers it
                [Path]
                PathExists=/etc/edge-config/gateway-status-web.py
                [Install]
                WantedBy=multi-user.target
            - path: /etc/systemd/system/gateway-status-web.service
              owner: root:root
              permissions: '0644'
              content: |
                [Unit]
                Description=MicroShift Gateway Status Web Dashboard
                After=network-online.target
                Wants=network-online.target
                [Service]
                Type=simple
                ExecStart=/usr/bin/python3 /etc/edge-config/gateway-status-web.py
                Restart=always
                RestartSec=5
                [Install]
                WantedBy=multi-user.target
            - path: /etc/edge-config/device-role
              owner: root:root
              permissions: '0644'
              content: "gw-b"
          runcmd:
            - hostnamectl set-hostname microshift-gw-b
            - systemctl enable --now firewalld
            - firewall-cmd --permanent --zone=trusted --add-source=10.42.0.0/16
            - firewall-cmd --permanent --zone=trusted --add-source=169.254.169.1
            - firewall-cmd --permanent --zone=public --add-port=6443/tcp
            - firewall-cmd --permanent --zone=public --add-port=80/tcp
            - firewall-cmd --permanent --zone=public --add-port=443/tcp
            - firewall-cmd --permanent --zone=public --add-port=5353/udp
            - firewall-cmd --permanent --add-protocol=vrrp
            - firewall-cmd --reload
            - systemctl enable --now microshift
            - bash -c 'for i in $(seq 1 60); do curl -k -s https://localhost:6443/readyz &>/dev/null && break; sleep 5; done'
            - mkdir -p /home/cloud-user/.kube
            - cp /var/lib/microshift/resources/kubeadmin/kubeconfig /home/cloud-user/.kube/config
            - chown -R cloud-user:cloud-user /home/cloud-user/.kube
            - chmod 600 /home/cloud-user/.kube/config
            - systemctl enable --now keepalived
            - systemctl enable --now qemu-guest-agent
            - systemctl enable --now flightctl-agent
            - systemctl daemon-reload
            - systemctl enable --now gateway-status-web.path
  data:
    - secretKey: activation_key
      remoteRef:
        key: rhel-subscription-creds
        property: activation-key
    - secretKey: org_id
      remoteRef:
        key: rhel-subscription-creds
        property: org-id
    - secretKey: client_cert
      remoteRef:
        key: flightctl-enrollment-creds
        property: client-certificate-data
    - secretKey: client_key
      remoteRef:
        key: flightctl-enrollment-creds
        property: client-key-data
    - secretKey: ca_data
      remoteRef:
        key: flightctl-enrollment-creds
        property: certificate-authority-data
    - secretKey: enrollment_ui
      remoteRef:
        key: flightctl-enrollment-creds
        property: enrollment-ui-endpoint
    - secretKey: agent_server
      remoteRef:
        key: flightctl-enrollment-creds
        property: agent-server

