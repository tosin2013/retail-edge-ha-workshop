# ExternalSecret - Module 1: RHEL HA Node 2
# Replaces cloudinit-node2.yaml. ESO renders the cloud-init Secret using:
#   - rhel-subscription-creds (openshift-cnv): RHSM activation key and org ID
#   - flightctl-enrollment-creds (openshift-cnv): enrollment client cert/key, CA bundle, server URLs
# Both Secrets are created by AgnosticD at deploy time. No credentials are stored in git.

---
# Student 01 - ExternalSecret for RHEL HA Node 2
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhel-ha-node2-cloudinit
  namespace: retail-edge-student-01
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: rhel-subscription-creds
    kind: ClusterSecretStore
  target:
    name: rhel-ha-node2-cloudinit
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        userdata: |
          #cloud-config
          user: cloud-user
          password: redhat
          chpasswd:
            expire: false
          ssh_pwauth: true
          rh_subscription:
            activation-key: '{{ .activation_key }}'
            org: '{{ .org_id }}'
            enable-repo:
              - rhel-9-for-x86_64-highavailability-rpms
              - rhel-9-for-x86_64-resilientstorage-rpms
              - edge-manager-1.0-for-rhel-9-x86_64-rpms
          packages:
            - pacemaker
            - pcs
            - fence-agents-kubevirt
            - corosync
            - fence-agents-all
            - gfs2-utils
            - dlm
            - lvm2-lockd
            - qemu-guest-agent
            - flightctl-agent
          write_files:
            - path: /etc/flightctl/config.yaml
              owner: root:root
              permissions: '0600'
              content: |
                enrollment-service:
                  authentication:
                    client-certificate-data: {{ .client_cert }}
                    client-key-data: {{ .client_key }}
                  enrollment-ui-endpoint: {{ .enrollment_ui }}
                  service:
                    certificate-authority-data: {{ .ca_data }}
                    server: {{ .agent_server }}
            - path: /etc/flightctl/labels.yaml
              owner: root:root
              permissions: '0644'
              content: |
                module: pacemaker
                role: node2
                alias: rhel-ha-node2
            - path: /etc/hosts
              owner: root:root
              permissions: '0644'
              append: true
              content: |
                10.101.0.20 rhel-ha-node1
                10.101.0.21 rhel-ha-node2
            - path: /etc/systemd/system/ha-status-web.path
              owner: root:root
              permissions: '0644'
              content: |
                [Unit]
                Description=Start HA dashboard when Fleet Manager delivers it
                [Path]
                PathExists=/etc/edge-config/ha-status-web.py
                [Install]
                WantedBy=multi-user.target
            - path: /etc/systemd/system/ha-status-web.service
              owner: root:root
              permissions: '0644'
              content: |
                [Unit]
                Description=Pacemaker HA Status Web Dashboard
                After=network-online.target
                Wants=network-online.target
                [Service]
                Type=simple
                ExecStart=/usr/bin/python3 /etc/edge-config/ha-status-web.py
                Restart=always
                RestartSec=5
                [Install]
                WantedBy=multi-user.target
            - path: /etc/edge-config/device-role
              owner: root:root
              permissions: '0644'
              content: "node2"
          runcmd:
            - hostnamectl set-hostname rhel-ha-node2
            - echo "redhat" | passwd --stdin hacluster
            - systemctl enable --now pcsd
            - systemctl enable --now qemu-guest-agent
            - systemctl enable --now flightctl-agent
            - systemctl daemon-reload
            - systemctl enable --now ha-status-web.path
  data:
    - secretKey: activation_key
      remoteRef:
        key: rhel-subscription-creds
        property: activation-key
    - secretKey: org_id
      remoteRef:
        key: rhel-subscription-creds
        property: org-id
    - secretKey: client_cert
      remoteRef:
        key: flightctl-enrollment-creds
        property: client-certificate-data
    - secretKey: client_key
      remoteRef:
        key: flightctl-enrollment-creds
        property: client-key-data
    - secretKey: ca_data
      remoteRef:
        key: flightctl-enrollment-creds
        property: certificate-authority-data
    - secretKey: enrollment_ui
      remoteRef:
        key: flightctl-enrollment-creds
        property: enrollment-ui-endpoint
    - secretKey: agent_server
      remoteRef:
        key: flightctl-enrollment-creds
        property: agent-server

