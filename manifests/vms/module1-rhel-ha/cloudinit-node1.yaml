# Cloud-init - RHEL HA Node 1
# Generated for 2 students | IP: 10.101.0.20

---
# Student 01 - Node 1 Cloud-init
apiVersion: v1
kind: Secret
metadata:
  name: rhel-ha-node1-cloudinit
  namespace: retail-edge-student-01
type: Opaque
stringData:
  userdata: |
    #cloud-config
    user: cloud-user
    password: redhat
    chpasswd:
      expire: false
    ssh_pwauth: true
    rh_subscription:
      activation-key: 'REPLACE_ACTIVATION_KEY'
      org: 'REPLACE_ORG_ID'
      enable-repo:
        - rhel-9-for-x86_64-highavailability-rpms
        - edge-manager-1.0-for-rhel-9-x86_64-rpms
    packages:
      - pacemaker
      - pcs
      - fence-agents-kubevirt
      - corosync
      - fence-agents-all
      - flightctl-agent
    write_files:
      - path: /etc/flightctl/config.yaml
        owner: root:root
        permissions: '0600'
        content: |
          enrollment-service:
            authentication:
              client-certificate-data: 
              client-key-data: 
            enrollment-ui-endpoint: https://console-openshift-console.apps.cluster-cfz7p.dynamic.redhatworkshops.io/edge
            service:
              certificate-authority-data: 
              server: https://agent-api.redhat-edge-manager.apps.cluster-cfz7p.dynamic.redhatworkshops.io/
      - path: /etc/flightctl/labels.yaml
        owner: root:root
        permissions: '0644'
        content: |
          module: pacemaker
          role: node1
      - path: /etc/edge-config/device-role
        owner: root:root
        permissions: '0644'
        content: "node1"
      - path: /etc/systemd/system/edge-config-pacemaker.service
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=Run pacemaker setup when fleet config arrives
          ConditionPathExists=/etc/edge-config/setup-pacemaker.sh
          ConditionPathExists=!/var/run/edge-config-pacemaker.done
          After=network-online.target flightctl-agent.service
          Wants=network-online.target
          [Service]
          Type=oneshot
          ExecStart=/bin/bash /etc/edge-config/setup-pacemaker.sh
          RemainAfterExit=true
          [Install]
          WantedBy=multi-user.target
      - path: /etc/systemd/system/edge-config-pacemaker.path
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=Watch for fleet config delivery
          [Path]
          PathExists=/etc/edge-config/setup-pacemaker.sh
          [Install]
          WantedBy=multi-user.target
    runcmd:
      - nmcli con add type ethernet con-name eth1-static ifname eth1 ipv4.addresses 10.101.0.20/24 ipv4.method manual connection.autoconnect yes
      - nmcli con up eth1-static
      - systemctl enable --now flightctl-agent
      - systemctl enable --now edge-config-pacemaker.path

