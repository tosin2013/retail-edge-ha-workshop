# Cloud-init - RHEL HA Node 1
# Generated for 2 students | IP: OVN DHCP assigned

---
# Student 01 - Node 1 Cloud-init
apiVersion: v1
kind: Secret
metadata:
  name: rhel-ha-node1-cloudinit
  namespace: retail-edge-student-01
type: Opaque
stringData:
  userdata: |
    #cloud-config
    user: cloud-user
    password: redhat
    chpasswd:
      expire: false
    ssh_pwauth: true
    rh_subscription:
      activation-key: 'REPLACE_ACTIVATION_KEY'
      org: 'REPLACE_ORG_ID'
      enable-repo:
        - rhel-9-for-x86_64-highavailability-rpms
        - rhel-9-for-x86_64-resilientstorage-rpms
        - edge-manager-1.0-for-rhel-9-x86_64-rpms
    packages:
      - pacemaker
      - pcs
      - fence-agents-kubevirt
      - corosync
      - fence-agents-all
      - gfs2-utils
      - dlm
      - lvm2-lockd
      - flightctl-agent
    write_files:
      - path: /etc/flightctl/config.yaml
        owner: root:root
        permissions: '0600'
        content: |
          enrollment-service:
            authentication:
              client-certificate-data: 
              client-key-data: 
            enrollment-ui-endpoint: https://console-openshift-console.apps.cluster-cfz7p.dynamic.redhatworkshops.io/edge
            service:
              certificate-authority-data: 
              server: https://agent-api.redhat-edge-manager.apps.cluster-cfz7p.dynamic.redhatworkshops.io/
      - path: /etc/flightctl/labels.yaml
        owner: root:root
        permissions: '0644'
        content: |
          module: pacemaker
          role: node1
          alias: rhel-ha-node1
      - path: /etc/edge-config/update-hosts.sh
        owner: root:root
        permissions: '0755'
        content: |
          #!/bin/bash
          set -euo pipefail
          ROLE_FILE="/etc/edge-config/device-role"
          [ ! -f "$ROLE_FILE" ] && exit 1
          ROLE=$(cat "$ROLE_FILE")
          case "$ROLE" in
            node1) HOSTNAME="rhel-ha-node1"; PEER="rhel-ha-node2" ;;
            node2) HOSTNAME="rhel-ha-node2"; PEER="rhel-ha-node1" ;;
            *) exit 1 ;;
          esac
          for attempt in $(seq 1 30); do
            MY_IP=$(ip -4 addr show eth1 2>/dev/null | grep -oP 'inet \K[0-9.]+' || true)
            [ -n "$MY_IP" ] && break
            sleep 5
          done
          [ -z "$MY_IP" ] && { echo "ERROR: no IP on eth1"; exit 1; }
          sed -i "/ ${HOSTNAME}\$/d" /etc/hosts
          echo "$MY_IP $HOSTNAME" >> /etc/hosts
          PEER_IP=""
          for attempt in $(seq 1 60); do
            for c in $(seq 2 254); do
              CIP=$(echo "$MY_IP" | sed "s/\.[0-9]*$/.$c/")
              [ "$CIP" = "$MY_IP" ] && continue
              if arping -c 1 -w 1 -I eth1 "$CIP" &>/dev/null; then
                PEER_IP="$CIP"; break 2
              fi
            done
            sleep 5
          done
          if [ -n "$PEER_IP" ]; then
            sed -i "/ ${PEER}\$/d" /etc/hosts
            echo "$PEER_IP $PEER" >> /etc/hosts
          fi
      - path: /etc/systemd/system/update-cluster-hosts.service
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=Discover cluster peer IPs and update /etc/hosts
          After=network-online.target
          Wants=network-online.target
          Before=corosync.service pacemaker.service
          [Service]
          Type=oneshot
          RemainAfterExit=true
          ExecStart=/bin/bash /etc/edge-config/update-hosts.sh
          StandardOutput=journal+console
          [Install]
          WantedBy=multi-user.target
      - path: /etc/systemd/system/ha-status-web.path
        owner: root:root
        permissions: '0644'
        content: |
          [Unit]
          Description=Start HA dashboard when Fleet Manager delivers it
          [Path]
          PathExists=/etc/edge-config/ha-status-web.py
          [Install]
          WantedBy=multi-user.target
      - path: /etc/edge-config/device-role
        owner: root:root
        permissions: '0644'
        content: "node1"
    runcmd:
      - hostnamectl set-hostname rhel-ha-node1
      - echo "redhat" | passwd --stdin hacluster
      - systemctl enable --now pcsd
      - systemctl daemon-reload
      - systemctl enable update-cluster-hosts.service
      - systemctl start update-cluster-hosts.service
      - systemctl enable --now flightctl-agent
      - systemctl enable ha-status-web.path

