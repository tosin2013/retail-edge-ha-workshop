  controlPlaneAgents: 3
  workerAgents: 0
  networking:
    clusterNetwork:
      - cidr: 10.202.0.0/16
        hostPrefix: 23
    serviceNetwork:
      - 172.32.0.0/16
    machineNetwork:
      - cidr: 10.103.0.0/24
  sshPublicKey: ""
  apiVIPs:
    - 10.103.0.10
  ingressVIPs:
    - 10.103.0.11
