---
# NMStateConfig - Module 3: Two-Node OpenShift
# Provides static IP configuration for twonode-net (Multus bridge) on each VM.
# MAC addresses are deterministic in KubeVirt (set explicitly in VM specs).
# IPs match the module3 network values: 10.103.0.20-22 per student.
#
# Student 01 - master1 (10.103.0.20)
apiVersion: agent-install.openshift.io/v1beta1
kind: NMStateConfig
metadata:
  name: student-01-master1
  namespace: student-01-twonode
  labels:
    infraenv: student-01-twonode
    student-id: "01"
    node: master1
    module: module3
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  interfaces:
    - name: eth1
      macAddress: "02:01:01:00:00:01"
  config:
    interfaces:
      - name: eth1
        type: ethernet
        state: up
        ipv4:
          enabled: true
          dhcp: false
          address:
            - ip: 10.103.0.20
              prefix-length: 24
    routes:
      config:
        - destination: 10.103.0.0/24
          next-hop-interface: eth1

