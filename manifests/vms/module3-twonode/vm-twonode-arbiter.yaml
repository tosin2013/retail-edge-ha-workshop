# =============================================================================
# VirtualMachine - Module 3: Two-Node OpenShift Arbiter
# =============================================================================
# Generated for 5 students
# Static IP: 10.103.0.22 (on twonode-net)
# Role: etcd Arbiter (quorum maintenance, no workloads)
# =============================================================================


---
# Student 01 - Two-Node Arbiter
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: twonode-arbiter
  namespace: retail-edge-student-01
  labels:
    app: twonode-ocp
    module: module3
    node: arbiter
    role: etcd-arbiter
    student-id: "01"
    app.kubernetes.io/name: twonode-arbiter
    app.kubernetes.io/part-of: retail-edge-ha
spec:
  running: false
  dataVolumeTemplates:
  - apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    metadata:
      name: twonode-arbiter-disk
    spec:
      source:
        pvc:
          namespace: retail-edge-infrastructure
          name: rhcos-image
      storage:
        resources:
          requests:
            storage: 20Gi
        storageClassName: ocs-external-storagecluster-ceph-rbd
        accessModes:
          - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: twonode-arbiter
        module: module3
        role: etcd-arbiter
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
          - disk:
              bus: virtio
            name: rootdisk
          - disk:
              bus: virtio
            name: ignitiondisk
          interfaces:
          - name: default
            masquerade: {}
          - name: twonode-net
            bridge: {}
          networkInterfaceMultiqueue: true
          rng: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        resources:
          requests:
            memory: 2Gi
      networks:
      - name: default
        pod: {}
      - name: twonode-net
        multus:
          networkName: retail-edge-student-01-udn/twonode-net
      volumes:
      - dataVolume:
          name: twonode-arbiter-disk
        name: rootdisk
      - secret:
          secretName: ignition-twonode-arbiter
        name: ignitiondisk

