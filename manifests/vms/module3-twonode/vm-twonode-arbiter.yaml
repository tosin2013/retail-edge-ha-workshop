# VirtualMachine - Module 3: Two-Node OpenShift twonode-arbiter
# etcd arbiter node — boots from discovery ISO.
# Official TNA minimums (Assisted Installer 2026): 2 CPU, 8 GiB RAM, 50 GiB disk.
# After OCP install completes the node only runs etcd and uses fewer resources,
# but must meet the Assisted Service hardware validation thresholds to register.
# MAC address on twonode-net matches NMStateConfig for static IP 10.103.0.22.

---
# Student 01 - Two-Node Arbiter
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: twonode-arbiter
  namespace: retail-edge-student-01
  annotations:
    tna.openshift.io/role: arbiter
  labels:
    app: twonode-ocp
    module: module3
    node: arbiter
    role: etcd-arbiter
    student-id: "01"
    app.kubernetes.io/name: twonode-arbiter
    app.kubernetes.io/part-of: retail-edge-ha
spec:
  runStrategy: Manual
  dataVolumeTemplates:
  - apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    metadata:
      name: twonode-arbiter-disk
    spec:
      source:
        blank: {}
      storage:
        resources:
          requests:
            storage: 50Gi
        storageClassName: gp3-csi-immediate
        accessModes:
          - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: twonode-arbiter
        module: module3
        role: etcd-arbiter
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        devices:
          disks:
          - disk:
              bus: virtio
            name: rootdisk
            bootOrder: 2
          - cdrom:
              bus: sata
              readonly: true
            name: discovery-iso
            bootOrder: 1
          interfaces:
          - name: default
            masquerade: {}
          - name: twonode-net
            bridge: {}
            macAddress: "02:01:01:00:00:03"
          networkInterfaceMultiqueue: true
          rng: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        resources:
          requests:
            memory: 8Gi
      networks:
      - name: default
        pod: {}
      - name: twonode-net
        multus:
          networkName: twonode-net
      volumes:
      - dataVolume:
          name: twonode-arbiter-disk
        name: rootdisk
      - name: discovery-iso
        dataVolume:
          name: twonode-arbiter-discovery-iso

