# VirtualMachine - Module 3: Two-Node OpenShift twonode-master1
# Generated for 2 students | Storage: ocs-external-storagecluster-ceph-rbd-immediate

---
# Student 01 - Two-Node Master 1
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: twonode-master1
  namespace: retail-edge-student-01
  labels:
    app: twonode-ocp
    module: module3
    node: master1
    role: control-plane
    student-id: "01"
    app.kubernetes.io/name: twonode-master1
    app.kubernetes.io/part-of: retail-edge-ha
spec:
  running: false
  dataVolumeTemplates:
  - apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    metadata:
      name: twonode-master1-disk
    spec:
      source:
        pvc:
          namespace: retail-edge-infrastructure
          name: rhcos-image
      storage:
        resources:
          requests:
            storage: 120Gi
        storageClassName: ocs-external-storagecluster-ceph-rbd-immediate
        accessModes:
          - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: twonode-master1
        module: module3
        role: control-plane
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        devices:
          disks:
          - disk:
              bus: virtio
            name: rootdisk
          - disk:
              bus: virtio
            name: ignitiondisk
          interfaces:
          - name: default
            masquerade: {}
          - name: twonode-net
            bridge: {}
          networkInterfaceMultiqueue: true
          rng: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        resources:
          requests:
            memory: 16Gi
      networks:
      - name: default
        pod: {}
      - name: twonode-net
        multus:
          networkName: twonode-net
      volumes:
      - dataVolume:
          name: twonode-master1-disk
        name: rootdisk
      - secret:
          secretName: ignition-twonode-master1
        name: ignitiondisk

