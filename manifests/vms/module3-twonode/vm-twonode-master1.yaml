# VirtualMachine - Module 3: Two-Node OpenShift twonode-master1
# Boots from RHACM Assisted Installer discovery ISO (InfraEnv CDROM).
# After booting, registers as an Agent in the student-NN-twonode namespace.
# MAC address on twonode-net matches NMStateConfig for static IP 10.103.0.20.

---
# Student 01 - Two-Node Master 1
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: twonode-master1
  namespace: retail-edge-student-01
  labels:
    app: twonode-ocp
    module: module3
    node: master1
    role: control-plane
    student-id: "01"
    app.kubernetes.io/name: twonode-master1
    app.kubernetes.io/part-of: retail-edge-ha
spec:
  runStrategy: Manual
  dataVolumeTemplates:
  - apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    metadata:
      name: twonode-master1-disk
    spec:
      source:
        blank: {}
      storage:
        resources:
          requests:
            storage: 40Gi
        storageClassName: ocs-external-storagecluster-ceph-rbd-immediate
        accessModes:
          - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: twonode-master1
        module: module3
        role: control-plane
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        devices:
          disks:
          - disk:
              bus: virtio
            name: rootdisk
            bootOrder: 2
          - cdrom:
              bus: sata
              readonly: true
            name: discovery-iso
            bootOrder: 1
          interfaces:
          - name: default
            masquerade: {}
          - name: twonode-net
            bridge: {}
            macAddress: "02:01:01:00:00:01"
          networkInterfaceMultiqueue: true
          rng: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        resources:
          requests:
            memory: 16Gi
      networks:
      - name: default
        pod: {}
      - name: twonode-net
        multus:
          networkName: twonode-net
      volumes:
      - dataVolume:
          name: twonode-master1-disk
        name: rootdisk
      - name: discovery-iso
        dataVolume:
          name: twonode-master1-discovery-iso

