---
# install-config Secret — Student 01
# Required by Hive ClusterDeployment admission webhook (spec.provisioning.installConfigSecretRef).
# Actual installation parameters are in AgentClusterInstall — this is a minimal placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: student-01-twonode-install-config
  namespace: student-01-twonode
  labels:
    student-id: "01"
    module: module3
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  install-config.yaml: |
    apiVersion: v1
    baseDomain: twonode.edge.example.com
    metadata:
      name: student-01-twonode
    compute:
      - architecture: amd64
        hyperthreading: Enabled
        name: worker
        replicas: 0
    controlPlane:
      architecture: amd64
      hyperthreading: Enabled
      name: master
      replicas: 3
    networking:
      clusterNetwork:
        - cidr: 10.201.0.0/16
          hostPrefix: 23
      machineNetwork:
        - cidr: 10.103.0.0/24
      networkType: OVNKubernetes
      serviceNetwork:
        - 172.31.0.0/16
    platform:
      none: {}
    pullSecret: ""
    sshKey: ""

