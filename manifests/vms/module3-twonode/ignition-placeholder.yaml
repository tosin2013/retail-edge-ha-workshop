---
# Student 01 - Master 1 Ignition
apiVersion: v1
kind: Secret
metadata:
  name: ignition-twonode-master1
  namespace: retail-edge-student-01
type: Opaque
stringData:
  ignition: |
    {
      "ignition": {
        "version": "3.2.0"
      },
      "passwd": {
        "users": [
          {
            "name": "core",
            "sshAuthorizedKeys": [
              "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... (replace-with-your-ssh-key)"
            ]
          }
        ]
      },
      "storage": {
        "files": [
          {
            "path": "/etc/hostname",
            "mode": 420,
            "contents": {
              "source": "data:text/plain;charset=utf-8;base64,dHdvbm9kZS1tYXN0ZXIxCg=="
            }
          },
          {
            "path": "/etc/NetworkManager/system-connections/eth1.nmconnection",
            "mode": 384,
            "contents": {
              "source": "data:text/plain;charset=utf-8;base64,W2Nvbm5lY3Rpb25dCmlkPWV0aDEKdHlwZT1ldGhlcm5ldAppbnRlcmZhY2UtbmFtZT1ldGgxCgpbaXB2NF0KYWRkcmVzcz0xMC4xMDMuMC4yMC8yNApnYXRld2F5PTEwLjEwMy4wLjEKbWV0aG9kPW1hbnVhbAo="
            }
          }
        ]
      },
      "systemd": {
        "units": [
          {
            "name": "placeholder.service",
            "enabled": false,
            "contents": "[Unit]\nDescription=Placeholder - Replace with openshift-install generated ignition\n"
          }
        ]
      }
    }

