# Ignition Configuration Placeholders - Module 3: Two-Node OpenShift
# Generated for 5 students
# IMPORTANT: These are PLACEHOLDER secrets. Generate proper ignition via openshift-install.

---
# Student 01 - Master1 Ignition
apiVersion: v1
kind: Secret
metadata:
  name: ignition-twonode-master1
  namespace: retail-edge-student-01
type: Opaque
stringData:
  ignition: |
    {
      "ignition": {
        "version": "3.2.0"
      },
      "passwd": {
        "users": [
          {
            "name": "core",
            "sshAuthorizedKeys": [
              "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... (replace-with-your-ssh-key)"
            ]
          }
        ]
      },
      "storage": {
        "files": [
          {
            "path": "/etc/hostname",
            "mode": 420,
            "contents": {
              "source": "data:text/plain;charset=utf-8;base64,dHdvbm9kZS1tYXN0ZXIx"
            }
          }
        ]
      }
    }

