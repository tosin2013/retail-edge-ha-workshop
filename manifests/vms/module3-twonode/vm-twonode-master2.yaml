# =============================================================================
# VirtualMachine - Module 3: Two-Node OpenShift Master 2
# =============================================================================
# Generated for 5 students
# Static IP: 10.103.0.21 (on twonode-net)
# Role: Control Plane + Worker (etcd member)
# =============================================================================


---
# Student 01 - Two-Node Master 2
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: twonode-master2
  namespace: retail-edge-student-01
  labels:
    app: twonode-ocp
    module: module3
    node: master2
    role: control-plane
    student-id: "01"
    app.kubernetes.io/name: twonode-master2
    app.kubernetes.io/part-of: retail-edge-ha
spec:
  running: true
  dataVolumeTemplates:
  - apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    metadata:
      name: twonode-master2-disk
    spec:
      source:
        pvc:
          namespace: retail-edge-infrastructure
          name: rhcos-image
      storage:
        resources:
          requests:
            storage: 120Gi
        storageClassName: ocs-external-storagecluster-ceph-rbd
        accessModes:
          - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: twonode-master2
        module: module3
        role: control-plane
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        devices:
          disks:
          - disk:
              bus: virtio
            name: rootdisk
          - disk:
              bus: virtio
            name: ignitiondisk
          interfaces:
          - name: default
            masquerade: {}
          - name: twonode-net
            bridge: {}
          networkInterfaceMultiqueue: true
          rng: {}
        firmware:
          bootloader:
            efi:
              secureBoot: false
        resources:
          requests:
            memory: 16Gi
      networks:
      - name: default
        pod: {}
      - name: twonode-net
        multus:
          networkName: retail-edge-student-01-udn/twonode-net
      volumes:
      - dataVolume:
          name: twonode-master2-disk
        name: rootdisk
      - secret:
          secretName: ignition-twonode-master2
        name: ignitiondisk

