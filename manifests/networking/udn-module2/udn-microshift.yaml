# =============================================================================
# User Defined Network - Module 2: MicroShift with VRRP
# =============================================================================
# This UDN provides Layer 2 networking for VRRP (Virtual Router Redundancy
# Protocol) virtual IP failover. VRRP requires Layer 2 for multicast
# advertisements (224.0.0.18) and ARP replies for the Virtual IP.
#
# Network Details:
#   - CIDR: 10.102.0.0/24
#   - Gateway: 10.102.0.1
#   - Virtual IP (VIP): 10.102.0.100
#   - Purpose: MicroShift VRRP failover for Point-of-Sale applications
#   - VMs per student: 2 (microshift-gw-a, microshift-gw-b)
#
# IP Allocation per Student:
#   - Student 01: 10.102.0.20-21 (nodes) + 10.102.0.100 (VIP)
#   - Student 02: 10.102.0.20-21 + 10.102.0.100 (isolated, same IPs OK)
#   - Student 03-50: Same pattern (each in their own UDN namespace)
# =============================================================================

---
# Student 01 - MicroShift VRRP Network
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: microshift-net
  namespace: retail-edge-student-01-udn
  labels:
    workshop: retail-edge-ha
    module: module2
    student-id: "01"
  annotations:
    description: "Layer 2 network for MicroShift VRRP virtual IP failover"
spec:
  topology: Layer2
  layer2:
    role: Primary
    subnets:
    - cidr: 10.102.0.0/24
      gateway: 10.102.0.1
      excludeSubnets:
      - 10.102.0.1/32           # Gateway reserved
      - 10.102.0.2-10.102.0.10  # Reserved for infrastructure
      - 10.102.0.100/32         # Virtual IP (VRRP)
    ipv4Mode: {}

---
# Student 02 - MicroShift VRRP Network
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: microshift-net
  namespace: retail-edge-student-02-udn
  labels:
    workshop: retail-edge-ha
    module: module2
    student-id: "02"
  annotations:
    description: "Layer 2 network for MicroShift VRRP virtual IP failover"
spec:
  topology: Layer2
  layer2:
    role: Primary
    subnets:
    - "10.102.0.0/24"

---
# Student 03 - MicroShift VRRP Network
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: microshift-net
  namespace: retail-edge-student-03-udn
  labels:
    workshop: retail-edge-ha
    module: module2
    student-id: "03"
  annotations:
    description: "Layer 2 network for MicroShift VRRP virtual IP failover"
spec:
  topology: Layer2
  layer2:
    role: Primary
    subnets:
    - "10.102.0.0/24"

---
# Student 04 - MicroShift VRRP Network
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: microshift-net
  namespace: retail-edge-student-04-udn
  labels:
    workshop: retail-edge-ha
    module: module2
    student-id: "04"
  annotations:
    description: "Layer 2 network for MicroShift VRRP virtual IP failover"
spec:
  topology: Layer2
  layer2:
    role: Primary
    subnets:
    - "10.102.0.0/24"

---
# Student 05 - MicroShift VRRP Network
apiVersion: k8s.ovn.org/v1
kind: UserDefinedNetwork
metadata:
  name: microshift-net
  namespace: retail-edge-student-05-udn
  labels:
    workshop: retail-edge-ha
    module: module2
    student-id: "05"
  annotations:
    description: "Layer 2 network for MicroShift VRRP virtual IP failover"
spec:
  topology: Layer2
  layer2:
    role: Primary
    subnets:
    - "10.102.0.0/24"
