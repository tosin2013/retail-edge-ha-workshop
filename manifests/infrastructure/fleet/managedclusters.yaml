# =============================================================================
# ManagedCluster CRs for Student Edge Sites
# =============================================================================
# Module 3 (Two-Node OpenShift) is managed by RHACM as a ManagedCluster.
# Modules 1 and 2 use Red Hat Edge Manager (flightctl) instead.
# Sync Wave: 1 (after MultiClusterHub is ready)
# =============================================================================

# Student 01 - Module 3: Two-Node OpenShift Cluster
---
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: student-01-twonode
  namespace: open-cluster-management
  labels:
    student-id: "01"
    module: "module3"
    architecture: "two-node-openshift"
    location: "edge-store-001"
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60

# Student 02 - Module 3: Two-Node OpenShift Cluster
---
apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: student-02-twonode
  namespace: open-cluster-management
  labels:
    student-id: "02"
    module: "module3"
    architecture: "two-node-openshift"
    location: "edge-store-002"
    app.kubernetes.io/part-of: retail-edge-ha-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60
