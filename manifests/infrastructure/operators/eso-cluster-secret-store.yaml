# ClusterSecretStore: Kubernetes provider reading rhel-subscription-creds
# and flightctl-enrollment-creds from the openshift-cnv namespace.
# NOTE: This file is for reference only. The ClusterSecretStore is created
# by AgnosticD workload.yml (after ArgoCD sync) to ensure ESO CRDs exist first.
# The caProvider is required by ESO v1 for the Kubernetes backend.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: rhel-subscription-creds
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: openshift-cnv
      remoteNamespace: openshift-cnv
      auth:
        serviceAccount:
          name: eso-kubernetes-reader
          namespace: openshift-operators
