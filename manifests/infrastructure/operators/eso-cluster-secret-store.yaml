# ClusterSecretStore: Kubernetes provider reading rhel-subscription-creds
# from the openshift-cnv namespace. Used by all ExternalSecret CRs in any namespace.
# sync-wave: 20 ensures ESO operator (wave 0) is ready before this CR is applied.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: rhel-subscription-creds
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    kubernetes:
      remoteNamespace: openshift-cnv
      auth:
        serviceAccount:
          name: eso-kubernetes-reader
          namespace: openshift-operators
