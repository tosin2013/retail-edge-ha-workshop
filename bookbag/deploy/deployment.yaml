---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookbag
  namespace: retail-edge-student-01
  labels:
    app: bookbag
    app.kubernetes.io/part-of: retail-edge-ha-workshop

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bookbag-edit
  namespace: retail-edge-student-01
  labels:
    app: bookbag
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: bookbag
  namespace: retail-edge-student-01

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookbag
  namespace: retail-edge-student-01
  labels:
    app: bookbag
    app.kubernetes.io/part-of: retail-edge-ha-workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookbag
  template:
    metadata:
      labels:
        app: bookbag
    spec:
      serviceAccountName: bookbag
      containers:
      - name: terminal
        image: quay.io/tosin2013/retail-edge-ha-bookbag:latest
        imagePullPolicy: Always
        env:
        - name: STUDENT_ID
          value: "01"
        - name: STUDENT_NAMESPACE
          value: "retail-edge-student-01"
        - name: STUDENT_UDN_NAMESPACE
          value: "retail-edge-student-01-udn"
        - name: STUDENT_USER
          value: "student-01"
        - name: CLUSTER_DOMAIN
          value: "apps.cluster-ntq88.dynamic.redhatworkshops.io"
        - name: CLUSTER_API
          value: "https://api.cluster-ntq88.dynamic.redhatworkshops.io:6443"
        - name: VM_USER
          value: "cloud-user"
        - name: VM_PASSWORD
          value: "redhat"
        - name: RHEL_NODE1
          value: "rhel-ha-node1"
        - name: RHEL_NODE2
          value: "rhel-ha-node2"
        - name: PACEMAKER_NET
          value: "pacemaker-net"
        - name: PACEMAKER_IP1
          value: "10.101.0.20"
        - name: PACEMAKER_IP2
          value: "10.101.0.21"
        - name: PACEMAKER_VIP
          value: "10.101.0.100"
        - name: MICROSHIFT_GW_A
          value: "microshift-gw-a"
        - name: MICROSHIFT_GW_B
          value: "microshift-gw-b"
        - name: MICROSHIFT_NET
          value: "microshift-net"
        - name: MICROSHIFT_IP_A
          value: "10.102.0.20"
        - name: MICROSHIFT_IP_B
          value: "10.102.0.21"
        - name: MICROSHIFT_VIP
          value: "10.102.0.100"
        - name: TWONODE_MASTER1
          value: "twonode-master1"
        - name: TWONODE_MASTER2
          value: "twonode-master2"
        - name: TWONODE_ARBITER
          value: "twonode-arbiter"
        - name: TWONODE_NET
          value: "twonode-net"
        - name: TWONODE_IP1
          value: "10.103.0.20"
        - name: TWONODE_IP2
          value: "10.103.0.21"
        - name: TWONODE_IP_ARBITER
          value: "10.103.0.22"
        - name: AUTH_USERNAME
          value: "student-01"
        - name: AUTH_PASSWORD
          value: "openshift"
        ports:
        - containerPort: 10080
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /workshop/
            port: 10080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /workshop/
            port: 10080
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: bookbag
  namespace: retail-edge-student-01
  labels:
    app: bookbag
    app.kubernetes.io/part-of: retail-edge-ha-workshop
spec:
  type: ClusterIP
  ports:
  - port: 10080
    targetPort: 10080
    protocol: TCP
    name: http
  selector:
    app: bookbag

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: bookbag
  namespace: retail-edge-student-01
  labels:
    app: bookbag
    app.kubernetes.io/part-of: retail-edge-ha-workshop
spec:
  to:
    kind: Service
    name: bookbag
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
