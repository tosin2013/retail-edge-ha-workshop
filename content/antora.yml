name: retail-edge-ha
title: Retail Edge High Availability Workshop
version: main
start_page: ROOT:index.adoc
nav:
- modules/ROOT/nav.adoc

asciidoc:
  attributes:
    # Core student identity (default: student-01)
    student-id: "01"
    student-namespace: retail-edge-student-01
    student-udn-namespace: retail-edge-student-01-udn
    student-user: student-01

    # Cluster information
    cluster-domain: apps.cluster-cfz7p.dynamic.redhatworkshops.io
    cluster-api: https://api.cluster-cfz7p.dynamic.redhatworkshops.io:6443

    # VM credentials
    vm-user: cloud-user
    vm-password: redhat

    # Module 1: Pacemaker HA (RHEL nodes)
    rhel-node1: rhel-ha-node1
    rhel-node2: rhel-ha-node2
    pacemaker-vip: 10.101.0.100

    # Module 2: MicroShift VRRP (Gateway nodes)
    microshift-gw-a: microshift-gw-a
    microshift-gw-b: microshift-gw-b
    microshift-vip: 10.102.0.100

    # Module 3: Two-Node OpenShift
    twonode-master1: twonode-master1
    twonode-master2: twonode-master2
    twonode-arbiter: twonode-arbiter
    twonode-ip2: 10.103.0.21
    twonode-ip-arbiter: 10.103.0.22
  extensions:
  - '@asciidoctor/tabs'
