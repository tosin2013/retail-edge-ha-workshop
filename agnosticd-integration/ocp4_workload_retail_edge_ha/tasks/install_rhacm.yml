---
# Install Red Hat Advanced Cluster Management (RHACM) operator if not present
# This task file is included from pre_workload.yml when auto_install is enabled

- name: Create open-cluster-management namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: open-cluster-management
    state: present

- name: Create OperatorGroup for RHACM
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: open-cluster-management-operatorgroup
        namespace: open-cluster-management
      spec:
        targetNamespaces:
          - open-cluster-management

- name: Subscribe to RHACM operator
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: advanced-cluster-management
        namespace: open-cluster-management
      spec:
        source: redhat-operators
        sourceNamespace: openshift-marketplace
        name: advanced-cluster-management
        channel: "{{ ocp4_workload_retail_edge_ha_rhacm_channel | default('release-2.16') }}"
        installPlanApproval: Automatic

- name: Wait for RHACM operator to be installed
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: open-cluster-management
  register: r_rhacm_csv
  retries: 30
  delay: 10
  until:
    - r_rhacm_csv.resources | length > 0
    - r_rhacm_csv.resources | selectattr('status.phase', 'equalto', 'Succeeded') | list | length > 0

- name: Get installed RHACM CSV name
  ansible.builtin.set_fact:
    rhacm_csv_name: "{{ r_rhacm_csv.resources | selectattr('status.phase', 'equalto', 'Succeeded') | map(attribute='metadata.name') | first }}"

- name: Wait for MultiClusterHub CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: multiclusterhubs.operator.open-cluster-management.io
  register: r_mch_crd
  retries: 30
  delay: 10
  until:
    - r_mch_crd.resources | length > 0
    - r_mch_crd.resources[0].status is defined
    - r_mch_crd.resources[0].status.conditions is defined
    - r_mch_crd.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | selectattr('status', 'equalto', 'True') | list | length > 0

- name: Create MultiClusterHub instance
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operator.open-cluster-management.io/v1
      kind: MultiClusterHub
      metadata:
        name: multiclusterhub
        namespace: open-cluster-management
      spec:
        availabilityConfig: "{{ ocp4_workload_retail_edge_ha_rhacm_availability | default('High') }}"
        enableClusterBackup: false

- name: Wait for MultiClusterHub to be ready
  kubernetes.core.k8s_info:
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: multiclusterhub
    namespace: open-cluster-management
  register: r_mch
  retries: 90
  delay: 20
  until:
    - r_mch.resources | length > 0
    - r_mch.resources[0].status is defined
    - r_mch.resources[0].status.phase is defined
    - r_mch.resources[0].status.phase == 'Running'

- name: Wait for ManagedCluster CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: managedclusters.cluster.open-cluster-management.io
  register: r_mc_crd
  retries: 30
  delay: 10
  until:
    - r_mc_crd.resources | length > 0
    - r_mc_crd.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | selectattr('status', 'equalto', 'True') | list | length > 0

- name: Create ManagedCluster placeholders for student Two-Node OCP sites
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cluster.open-cluster-management.io/v1
      kind: ManagedCluster
      metadata:
        name: "student-{{ '%02d' | format(item) }}-twonode"
        labels:
          student-id: "{{ '%02d' | format(item) }}"
          module: "module3"
          architecture: "two-node-openshift"
          app.kubernetes.io/part-of: retail-edge-ha-workshop
      spec:
        hubAcceptsClient: true
        leaseDurationSeconds: 60
  loop: "{{ range(1, (num_users | int) + 1) | list }}"
  when: ocp4_workload_retail_edge_ha_enable_module3 | default(true) | bool

- name: Create student RHACM view RoleBindings
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "student-{{ '%02d' | format(item) }}-rhacm-view"
        namespace: open-cluster-management
        labels:
          app.kubernetes.io/part-of: retail-edge-ha-workshop
          student-id: "{{ '%02d' | format(item) }}"
      subjects:
        - kind: User
          name: "student{{ '%02d' | format(item) }}"
          apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: ClusterRole
        name: open-cluster-management:view
        apiGroup: rbac.authorization.k8s.io
  loop: "{{ range(1, (num_users | int) + 1) | list }}"
  ignore_errors: true

- name: Wait for AgentServiceConfig CRD to be available
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: agentserviceconfigs.agent-install.openshift.io
  register: r_asc_crd
  retries: 60
  delay: 10
  until:
    - r_asc_crd.resources | length > 0
    - r_asc_crd.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | selectattr('status', 'equalto', 'True') | list | length > 0
  when: ocp4_workload_retail_edge_ha_assisted_installer_enabled | default(true) | bool

- name: Create AgentServiceConfig to enable Assisted Installer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: agent-install.openshift.io/v1beta1
      kind: AgentServiceConfig
      metadata:
        name: agent
        namespace: multicluster-engine
      spec:
        databaseStorage:
          storageClassName: "{{ ocp4_workload_retail_edge_ha_storage_class }}"
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "{{ ocp4_workload_retail_edge_ha_assisted_db_storage | default('10Gi') }}"
        filesystemStorage:
          storageClassName: "{{ ocp4_workload_retail_edge_ha_storage_class }}"
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "{{ ocp4_workload_retail_edge_ha_assisted_fs_storage | default('50Gi') }}"
        imageStorage:
          storageClassName: "{{ ocp4_workload_retail_edge_ha_storage_class }}"
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "{{ ocp4_workload_retail_edge_ha_assisted_image_storage | default('50Gi') }}"
  when: ocp4_workload_retail_edge_ha_assisted_installer_enabled | default(true) | bool

- name: Wait for AgentServiceConfig to be reconciled
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: AgentServiceConfig
    name: agent
    namespace: multicluster-engine
  register: r_asc
  retries: 60
  delay: 10
  until:
    - r_asc.resources | length > 0
    - r_asc.resources[0].status is defined
    - r_asc.resources[0].status.conditions is defined
    - r_asc.resources[0].status.conditions | selectattr('type', 'equalto', 'ReconcileCompleted') | selectattr('status', 'equalto', 'True') | list | length > 0
  when: ocp4_workload_retail_edge_ha_assisted_installer_enabled | default(true) | bool

- name: Create ClusterImageSet for OCP 4.21
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: hive.openshift.io/v1
      kind: ClusterImageSet
      metadata:
        name: openshift-v4.21
        labels:
          app.kubernetes.io/part-of: retail-edge-ha-workshop
          app.kubernetes.io/managed-by: agnosticd
      spec:
        releaseImage: "quay.io/openshift-release-dev/ocp-release:{{ ocp4_workload_retail_edge_ha_twonode_ocp_version }}.0-x86_64"
  when:
    - ocp4_workload_retail_edge_ha_enable_module3 | default(true) | bool
    - ocp4_workload_retail_edge_ha_assisted_installer_enabled | default(true) | bool

- name: Create per-student cluster namespaces for Assisted Installer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "student-{{ '%02d' | format(item) }}-twonode"
        labels:
          student-id: "{{ '%02d' | format(item) }}"
          module: module3
          app.kubernetes.io/part-of: retail-edge-ha-workshop
          app.kubernetes.io/managed-by: agnosticd
  loop: "{{ range(1, (num_users | int) + 1) | list }}"
  when:
    - ocp4_workload_retail_edge_ha_enable_module3 | default(true) | bool
    - ocp4_workload_retail_edge_ha_assisted_installer_enabled | default(true) | bool

- name: Grant student view access to their cluster namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "student-{{ '%02d' | format(item) }}-cluster-view"
        namespace: "student-{{ '%02d' | format(item) }}-twonode"
        labels:
          app.kubernetes.io/part-of: retail-edge-ha-workshop
          student-id: "{{ '%02d' | format(item) }}"
      subjects:
        - kind: User
          name: "student{{ '%02d' | format(item) }}"
          apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: ClusterRole
        name: view
        apiGroup: rbac.authorization.k8s.io
  loop: "{{ range(1, (num_users | int) + 1) | list }}"
  when:
    - ocp4_workload_retail_edge_ha_enable_module3 | default(true) | bool
    - ocp4_workload_retail_edge_ha_assisted_installer_enabled | default(true) | bool
  ignore_errors: true

- name: RHACM installation complete
  ansible.builtin.debug:
    msg: "Red Hat Advanced Cluster Management installed and ready ({{ rhacm_csv_name }})"
