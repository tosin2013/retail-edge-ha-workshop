---
# Pre-workload validation tasks
# Validates cluster prerequisites before deploying the workshop

- name: Print AgnosticD user info
  ansible.builtin.debug:
    msg: "{{ agnosticd_user_info | default('Not running in AgnosticD context') }}"
    verbosity: 2

- name: Get cluster version
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: ClusterVersion
    name: version
  register: r_cluster_version

- name: Extract cluster version
  ansible.builtin.set_fact:
    workshop_cluster_version: "{{ r_cluster_version.resources[0].status.desired.version }}"

- name: Verify OpenShift 4.21+
  ansible.builtin.assert:
    that:
      - workshop_cluster_version is version('4.21', '>=')
    fail_msg: "Workshop requires OpenShift 4.21 or later (found {{ workshop_cluster_version }})"
    success_msg: "OpenShift version {{ workshop_cluster_version }} meets requirements"

- name: Get cluster ingress domain
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Ingress
    name: cluster
  register: r_cluster_ingress

- name: Get cluster API server URL
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Infrastructure
    name: cluster
  register: r_cluster_infrastructure

- name: Set cluster domain and API URL facts
  ansible.builtin.set_fact:
    ocp4_workload_retail_edge_ha_cluster_domain: "{{ r_cluster_ingress.resources[0].spec.domain }}"
    ocp4_workload_retail_edge_ha_cluster_api_url: "{{ r_cluster_infrastructure.resources[0].status.apiServerURL }}"

- name: Print discovered cluster information
  ansible.builtin.debug:
    msg:
      - "Cluster domain: {{ ocp4_workload_retail_edge_ha_cluster_domain }}"
      - "API server URL: {{ ocp4_workload_retail_edge_ha_cluster_api_url }}"

- name: Check for RHACM operator
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: open-cluster-management
  register: r_rhacm_operator
  failed_when: false

- name: Set RHACM installation status fact
  ansible.builtin.set_fact:
    rhacm_installed: "{{ r_rhacm_operator.resources | length > 0 and r_rhacm_operator.resources[0].status.phase == 'Succeeded' }}"

- name: Install RHACM if not present and auto-install enabled
  ansible.builtin.include_tasks: install_rhacm.yml
  when:
    - not rhacm_installed
    - ocp4_workload_retail_edge_ha_enable_fleet | default(false) | bool
    - ocp4_workload_retail_edge_ha_auto_install_rhacm | default(true) | bool

- name: Verify RHACM operator is installed when fleet management is enabled
  ansible.builtin.fail:
    msg: |
      RHACM operator is not installed but fleet management is enabled.

      To install it automatically, set: ocp4_workload_retail_edge_ha_auto_install_rhacm=true

      Or install manually:
        oc create -f https://raw.githubusercontent.com/open-cluster-management-io/multiclusterhub-operator/main/examples/multiclusterhub/example-multiclusterhub-cr.yaml
  when:
    - not rhacm_installed
    - ocp4_workload_retail_edge_ha_enable_fleet | default(false) | bool
    - not ocp4_workload_retail_edge_ha_auto_install_rhacm | default(true) | bool

- name: Confirm RHACM operator is ready
  ansible.builtin.debug:
    msg: "RHACM operator found and ready"
  when: rhacm_installed

- name: Check for CNV operator
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: openshift-cnv
  register: r_cnv_operator
  failed_when: false

- name: Set CNV installation status fact
  ansible.builtin.set_fact:
    cnv_installed: "{{ r_cnv_operator.resources | length > 0 and r_cnv_operator.resources[0].status.phase == 'Succeeded' }}"

- name: Install OpenShift Virtualization if not present and auto-install enabled
  ansible.builtin.include_tasks: install_virtualization.yml
  when:
    - not cnv_installed
    - ocp4_workload_retail_edge_ha_auto_install_virtualization | bool

- name: Verify Virtualization operator is installed (manual prerequisite)
  ansible.builtin.fail:
    msg: |
      OpenShift Virtualization operator is not installed.

      To install it automatically, set: ocp4_workload_retail_edge_ha_auto_install_virtualization=true

      Or install manually:
        oc create -f https://raw.githubusercontent.com/openshift-cnv/hyperconverged-cluster-operator/main/deploy/deploy.yaml
  when:
    - not cnv_installed
    - not ocp4_workload_retail_edge_ha_auto_install_virtualization | bool

- name: Confirm Virtualization operator is ready
  ansible.builtin.debug:
    msg: "OpenShift Virtualization operator found and ready"
  when: cnv_installed

- name: Get available storage classes
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
  register: r_storage_classes

- name: Fail if no storage classes available
  ansible.builtin.fail:
    msg: "No storage classes found on cluster"
  when: r_storage_classes.resources | length == 0

- name: Auto-detect best storage class
  ansible.builtin.set_fact:
    workshop_storage_class: >-
      {{
        r_storage_classes.resources
        | selectattr('metadata.name', 'search', 'rbd')
        | list
        | first
        | default(
            r_storage_classes.resources
            | selectattr('metadata.annotations.storageclass.kubernetes.io/is-default-class', 'defined')
            | selectattr('metadata.annotations.storageclass.kubernetes.io/is-default-class', 'equalto', 'true')
            | list
            | first
            | default(r_storage_classes.resources | first)
          )
      }}

- name: Print selected storage class
  ansible.builtin.debug:
    msg: "Using storage class: {{ workshop_storage_class.metadata.name }}"

- name: Pre-workload tasks complete
  ansible.builtin.debug:
    msg: "Pre-workload validation completed successfully"
