---
# Default variables for ocp4_workload_retail_edge_ha
# These can be overridden via AgnosticD extra-vars

# Standard AgnosticD variables
become_override: false
ocp_username: "{{ ansible_user | default('opentlc-mgr') }}"
silent: false

# Workshop repository settings
ocp4_workload_retail_edge_ha_repo_url: "https://github.com/tosin2013/retail-edge-ha-workshop.git"
ocp4_workload_retail_edge_ha_repo_version: "main"
ocp4_workload_retail_edge_ha_git_repo: "https://github.com/tosin2013/retail-edge-ha-workshop.git"
ocp4_workload_retail_edge_ha_git_branch: "main"
ocp4_workload_retail_edge_ha_build_namespace: "retail-edge-workshop-builds"

# Deployment settings
ocp4_workload_retail_edge_ha_namespace: "retail-edge-ha-gitops"
ocp4_workload_retail_edge_ha_release_name: "retail-edge-ha"
ocp4_workload_retail_edge_ha_auto_start_vms: false
ocp4_workload_retail_edge_ha_enable_showroom: true

# Operator installation
ocp4_workload_retail_edge_ha_auto_install_virtualization: true
ocp4_workload_retail_edge_ha_cnv_channel: "stable"

# Module selection
# Module 3 (Two-Node OCP) is deployed as per-student AWS clusters by AgnosticD,
# not as KubeVirt VMs on the hub. Set to false to skip the KubeVirt/Assisted Installer path.
ocp4_workload_retail_edge_ha_enable_module1: true
ocp4_workload_retail_edge_ha_enable_module2: true
ocp4_workload_retail_edge_ha_enable_module3: false

# RHEL VM Subscription (required for RHEL 9 VMs to get yum repos)
# These values should be set in agnosticd-v2-secrets/<account>.yml
# Create an activation key at: https://access.redhat.com/management/activation_keys
ocp4_workload_retail_edge_ha_rhel_activation_key: ""
ocp4_workload_retail_edge_ha_rhel_org_id: ""

# Module 3: Per-student two-node OCP clusters provisioned on AWS by AgnosticD.
# Students interact with their cluster via RHACM on the hub.
# The hub workload imports each student cluster as a ManagedCluster after provisioning.
ocp4_workload_retail_edge_ha_twonode_ocp_version: "4.21"

# Storage class for hub PVCs (modules 1 and 2 only)
ocp4_workload_retail_edge_ha_storage_class: "ocs-external-storagecluster-ceph-rbd-immediate"

# SSH public key for student cluster nodes (set in secrets file)
ocp4_workload_retail_edge_ha_ssh_public_key: ""

# Pull secret (set in secrets file — never hard-code)
ocp4_workload_retail_edge_ha_pull_secret: ""

# Cluster information (auto-discovered in pre_workload.yml)
# These are set dynamically and don't need to be overridden
# ocp4_workload_retail_edge_ha_cluster_domain: ""
# ocp4_workload_retail_edge_ha_cluster_api_url: ""

# Cluster admin credentials reported to students via agnosticd_user_info.
# openshift_cluster_admin_username defaults to ocp_username.
# openshift_cluster_admin_password must be set in agnosticd-v2-secrets/<account>.yml
# or passed as an extra-var; it is never hard-coded here.
openshift_cluster_admin_username: "{{ ocp_username }}"
openshift_cluster_admin_password: ""

# Multi-user workshop settings
num_users: 1

# RHDP resource tagging (required for cost management and automated cleanup)
cloud_tags:
  owner: "{{ owner | default('rhdp') }}"
  guid: "{{ guid | default('') }}"
  config: "ocp4_workload_retail_edge_ha"
  env_type: "{{ env_type | default('openshift-workloads') }}"
